<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">

  <!-- ===== BODY ===== -->
  <!-- top arc -->
  <rect x="8"  y="0"  width="16" height="1" fill="#55CC44"/>
  <rect x="5"  y="1"  width="22" height="1" fill="#55CC44"/>
  <rect x="3"  y="2"  width="26" height="1" fill="#55CC44"/>
  <rect x="2"  y="3"  width="28" height="1" fill="#55CC44"/>
  <rect x="1"  y="4"  width="30" height="1" fill="#55CC44"/>
  <!-- highlight -->
  <rect x="6"  y="3"  width="6"  height="3" fill="#88EE66"/>
  <!-- wide middle -->
  <rect x="0"  y="5"  width="32" height="12" fill="#55CC44"/>
  <!-- bottom narrowing -->
  <rect x="1"  y="17" width="30" height="1" fill="#55CC44"/>
  <rect x="2"  y="18" width="28" height="1" fill="#55CC44"/>
  <rect x="3"  y="19" width="26" height="1" fill="#55CC44"/>
  <rect x="5"  y="20" width="22" height="1" fill="#55CC44"/>
  <rect x="7"  y="21" width="18" height="1" fill="#55CC44"/>
  <!-- bottom bumps (feet) -->
  <rect x="5"  y="22" width="8"  height="2" fill="#55CC44"/>
  <rect x="19" y="22" width="8"  height="2" fill="#55CC44"/>
  <rect x="6"  y="24" width="6"  height="1" fill="#55CC44"/>
  <rect x="20" y="24" width="6"  height="1" fill="#55CC44"/>

  <!-- ===== LEFT EYE ===== -->
  <rect x="7"  y="7"  width="5"  height="5" fill="#FFFFFF"/>
  <rect x="9"  y="9"  width="2"  height="2" fill="#1A1A2E"/>
  <rect x="10" y="8"  width="1"  height="1" fill="#6688FF"/>

  <!-- ===== RIGHT EYE ===== -->
  <rect x="20" y="7"  width="5"  height="5" fill="#FFFFFF"/>
  <rect x="22" y="9"  width="2"  height="2" fill="#1A1A2E"/>
  <rect x="23" y="8"  width="1"  height="1" fill="#6688FF"/>

  <!-- ===== MOUTH (smile) ===== -->
  <rect x="11" y="15" width="1"  height="1" fill="#227722"/>
  <rect x="20" y="15" width="1"  height="1" fill="#227722"/>
  <rect x="12" y="16" width="8"  height="1" fill="#227722"/>

  <!-- ===== SHADOW (bottom edge darker) ===== -->
  <rect x="2"  y="19" width="28" height="1" fill="#44AA33"/>
  <rect x="4"  y="20" width="24" height="1" fill="#44AA33"/>

</svg>
