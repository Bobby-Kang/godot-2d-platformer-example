<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- Row 0: top arc -->
  <rect x="4" y="0" width="8" height="1" fill="#55CC44"/>
  <!-- Row 1 -->
  <rect x="2" y="1" width="12" height="1" fill="#55CC44"/>
  <!-- Row 2: with highlight -->
  <rect x="1" y="2" width="14" height="1" fill="#55CC44"/>
  <rect x="4" y="2" width="3" height="1" fill="#88EE66"/>
  <!-- Row 3 -->
  <rect x="1" y="3" width="14" height="1" fill="#55CC44"/>
  <!-- Row 4-5: widest -->
  <rect x="0" y="4" width="16" height="2" fill="#55CC44"/>
  <!-- Row 6: eye whites -->
  <rect x="0" y="6" width="3" height="1" fill="#55CC44"/>
  <rect x="3" y="6" width="2" height="1" fill="#FFFFFF"/>
  <rect x="5" y="6" width="4" height="1" fill="#55CC44"/>
  <rect x="9" y="6" width="2" height="1" fill="#FFFFFF"/>
  <rect x="11" y="6" width="5" height="1" fill="#55CC44"/>
  <!-- Row 7: pupils -->
  <rect x="0" y="7" width="3" height="1" fill="#55CC44"/>
  <rect x="3" y="7" width="1" height="1" fill="#FFFFFF"/>
  <rect x="4" y="7" width="1" height="1" fill="#1A1A2E"/>
  <rect x="5" y="7" width="4" height="1" fill="#55CC44"/>
  <rect x="9" y="7" width="1" height="1" fill="#FFFFFF"/>
  <rect x="10" y="7" width="1" height="1" fill="#1A1A2E"/>
  <rect x="11" y="7" width="5" height="1" fill="#55CC44"/>
  <!-- Row 8 -->
  <rect x="0" y="8" width="16" height="1" fill="#55CC44"/>
  <!-- Row 9: mouth corners -->
  <rect x="0" y="9" width="5" height="1" fill="#55CC44"/>
  <rect x="5" y="9" width="1" height="1" fill="#227722"/>
  <rect x="6" y="9" width="4" height="1" fill="#55CC44"/>
  <rect x="10" y="9" width="1" height="1" fill="#227722"/>
  <rect x="11" y="9" width="5" height="1" fill="#55CC44"/>
  <!-- Row 10: mouth curve -->
  <rect x="0" y="10" width="6" height="1" fill="#55CC44"/>
  <rect x="6" y="10" width="4" height="1" fill="#227722"/>
  <rect x="10" y="10" width="6" height="1" fill="#55CC44"/>
  <!-- Row 11 -->
  <rect x="0" y="11" width="16" height="1" fill="#55CC44"/>
  <!-- Row 12 -->
  <rect x="1" y="12" width="14" height="1" fill="#55CC44"/>
  <!-- Row 13 -->
  <rect x="2" y="13" width="12" height="1" fill="#55CC44"/>
  <!-- Row 14: bottom bumps -->
  <rect x="3" y="14" width="3" height="1" fill="#55CC44"/>
  <rect x="8" y="14" width="4" height="1" fill="#55CC44"/>
</svg>
