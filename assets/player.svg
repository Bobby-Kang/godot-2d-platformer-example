<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">

  <!-- ===== HAIR ===== -->
  <rect x="12" y="0" width="8"  height="1" fill="#F5C518"/>
  <rect x="10" y="1" width="12" height="1" fill="#F5C518"/>
  <rect x="9"  y="2" width="2"  height="1" fill="#F5C518"/>
  <rect x="21" y="2" width="2"  height="1" fill="#F5C518"/>
  <rect x="9"  y="3" width="1"  height="8" fill="#F5C518"/>
  <rect x="22" y="3" width="1"  height="8" fill="#F5C518"/>

  <!-- ===== FACE (skin) ===== -->
  <rect x="10" y="2" width="11" height="9" fill="#FDBCB4"/>
  <rect x="10" y="3" width="12" height="8" fill="#FDBCB4"/>
  <rect x="11" y="11" width="10" height="1" fill="#FDBCB4"/>
  <rect x="12" y="12" width="8"  height="1" fill="#FDBCB4"/>

  <!-- ===== LEFT EYE ===== -->
  <rect x="11" y="4" width="3" height="3" fill="#FFFFFF"/>
  <rect x="12" y="5" width="1" height="1" fill="#2C1A0E"/>
  <rect x="11" y="7" width="3" height="1" fill="#2C1A0E"/>

  <!-- ===== RIGHT EYE ===== -->
  <rect x="18" y="4" width="3" height="3" fill="#FFFFFF"/>
  <rect x="19" y="5" width="1" height="1" fill="#2C1A0E"/>
  <rect x="18" y="7" width="3" height="1" fill="#2C1A0E"/>

  <!-- ===== MOUTH ===== -->
  <rect x="13" y="9"  width="1" height="1" fill="#C44040"/>
  <rect x="18" y="9"  width="1" height="1" fill="#C44040"/>
  <rect x="14" y="10" width="4" height="1" fill="#C44040"/>

  <!-- ===== NECK ===== -->
  <rect x="13" y="13" width="6" height="2" fill="#FDBCB4"/>

  <!-- ===== ARMOR BODY (slightly narrower) ===== -->
  <rect x="10" y="15" width="12" height="7" fill="#3A5CC5"/>
  <rect x="10" y="15" width="1"  height="7" fill="#253E8B"/>
  <rect x="21" y="15" width="1"  height="7" fill="#253E8B"/>
  <rect x="15" y="16" width="2"  height="5" fill="#4A6CE5"/>

  <!-- ===== ARMS (skin) ===== -->
  <rect x="8"  y="15" width="2" height="6" fill="#FDBCB4"/>
  <rect x="22" y="15" width="2" height="4" fill="#FDBCB4"/>

  <!-- ===== BELT ===== -->
  <rect x="10" y="22" width="12" height="2" fill="#8B6340"/>
  <rect x="14" y="22" width="4"  height="2" fill="#DAA520"/>

  <!-- ===== LEGS ===== -->
  <rect x="10" y="24" width="5" height="5" fill="#6B3A2A"/>
  <rect x="17" y="24" width="5" height="5" fill="#6B3A2A"/>

  <!-- ===== BOOTS ===== -->
  <rect x="9"  y="27" width="7" height="5" fill="#3A2A1F"/>
  <rect x="17" y="27" width="7" height="5" fill="#3A2A1F"/>
  <rect x="10" y="28" width="2" height="2" fill="#4A3A2F"/>
  <rect x="18" y="28" width="2" height="2" fill="#4A3A2F"/>

  <!-- ===== SWORD ===== -->
  <!-- 손잡이 (갈색 grip) -->
  <rect x="22" y="17" width="2" height="5" fill="#8B4513"/>
  <rect x="22" y="18" width="2" height="3" fill="#6B3010"/>
  <!-- 포멜 (grip 끝 금장식) -->
  <rect x="22" y="22" width="2" height="1" fill="#DAA520"/>

  <!-- 가드 (세로 금색 크로스가드) -->
  <rect x="23" y="13" width="3" height="9" fill="#DAA520"/>
  <rect x="24" y="13" width="1" height="9" fill="#FFD700"/>
  <rect x="23" y="13" width="3" height="1" fill="#FFD700"/>
  <rect x="23" y="21" width="3" height="1" fill="#B8860B"/>

  <!-- 블레이드 (길고 넓은 은색 칼날) -->
  <!-- 칼날 상단 하이라이트 -->
  <rect x="26" y="14" width="6" height="1" fill="#F0F0FF"/>
  <!-- 칼날 메인 상단 -->
  <rect x="26" y="15" width="6" height="2" fill="#E0E0F0"/>
  <!-- 칼날 메인 -->
  <rect x="26" y="17" width="5" height="2" fill="#C0C0D0"/>
  <!-- 칼날 하단 엣지 -->
  <rect x="26" y="19" width="4" height="1" fill="#A0A0B0"/>
  <!-- 칼날 끝 포인트 -->
  <rect x="31" y="15" width="1" height="1" fill="#F0F0FF"/>
  <rect x="31" y="16" width="1" height="2" fill="#E0E0F0"/>
  <rect x="31" y="18" width="1" height="1" fill="#C0C0D0"/>
  <!-- 칼날 중앙 홈 (fuller) -->
  <rect x="26" y="16" width="5" height="1" fill="#D8D8E8"/>

</svg>
