<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- Row 0: hair top -->
  <rect x="3" y="0" width="6" height="1" fill="#F5C518"/>
  <!-- Row 1: hair wide -->
  <rect x="2" y="1" width="8" height="1" fill="#F5C518"/>
  <!-- Row 2: hair sides + face -->
  <rect x="2" y="2" width="1" height="1" fill="#F5C518"/>
  <rect x="3" y="2" width="6" height="1" fill="#FDBCB4"/>
  <rect x="9" y="2" width="1" height="1" fill="#F5C518"/>
  <!-- Row 3: hair sides + eyes -->
  <rect x="2" y="3" width="1" height="1" fill="#F5C518"/>
  <rect x="3" y="3" width="1" height="1" fill="#FDBCB4"/>
  <rect x="4" y="3" width="1" height="1" fill="#2C1A0E"/>
  <rect x="5" y="3" width="2" height="1" fill="#FDBCB4"/>
  <rect x="7" y="3" width="1" height="1" fill="#2C1A0E"/>
  <rect x="8" y="3" width="1" height="1" fill="#FDBCB4"/>
  <rect x="9" y="3" width="1" height="1" fill="#F5C518"/>
  <!-- Row 4: cheeks -->
  <rect x="3" y="4" width="6" height="1" fill="#FDBCB4"/>
  <!-- Row 5: mouth -->
  <rect x="3" y="5" width="2" height="1" fill="#FDBCB4"/>
  <rect x="5" y="5" width="2" height="1" fill="#C44040"/>
  <rect x="7" y="5" width="2" height="1" fill="#FDBCB4"/>
  <!-- Row 6: neck -->
  <rect x="4" y="6" width="4" height="1" fill="#FDBCB4"/>
  <!-- Row 7: body + arms -->
  <rect x="2" y="7" width="1" height="1" fill="#FDBCB4"/>
  <rect x="3" y="7" width="6" height="1" fill="#3A5CC5"/>
  <rect x="9" y="7" width="1" height="1" fill="#FDBCB4"/>
  <!-- Row 8: body + right arm extended with sword -->
  <rect x="1" y="8" width="2" height="1" fill="#FDBCB4"/>
  <rect x="3" y="8" width="6" height="1" fill="#3A5CC5"/>
  <rect x="9" y="8" width="1" height="1" fill="#DAA520"/>
  <rect x="10" y="8" width="5" height="1" fill="#C8C8C8"/>
  <!-- Row 9: body + sword grip -->
  <rect x="1" y="9" width="2" height="1" fill="#FDBCB4"/>
  <rect x="3" y="9" width="6" height="1" fill="#3A5CC5"/>
  <rect x="9" y="9" width="1" height="1" fill="#8B4513"/>
  <!-- Row 10: body lower -->
  <rect x="2" y="10" width="1" height="1" fill="#FDBCB4"/>
  <rect x="3" y="10" width="6" height="1" fill="#3A5CC5"/>
  <rect x="9" y="10" width="1" height="1" fill="#FDBCB4"/>
  <!-- Row 11: belt -->
  <rect x="3" y="11" width="6" height="1" fill="#8B6340"/>
  <!-- Row 12-13: legs -->
  <rect x="3" y="12" width="3" height="2" fill="#6B3A2A"/>
  <rect x="7" y="12" width="3" height="2" fill="#6B3A2A"/>
  <!-- Row 14: boots top -->
  <rect x="2" y="14" width="2" height="1" fill="#3A2A1F"/>
  <rect x="4" y="14" width="2" height="1" fill="#6B3A2A"/>
  <rect x="7" y="14" width="2" height="1" fill="#6B3A2A"/>
  <rect x="9" y="14" width="2" height="1" fill="#3A2A1F"/>
  <!-- Row 15: boots bottom -->
  <rect x="2" y="15" width="3" height="1" fill="#3A2A1F"/>
  <rect x="8" y="15" width="3" height="1" fill="#3A2A1F"/>
</svg>
